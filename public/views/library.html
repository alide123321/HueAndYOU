<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Hue & YOU - Library</title>
  <script type="importmap">
    {
      "imports": {
        "culori": "https://cdn.jsdelivr.net/npm/culori@4.0.2/+esm"
      }
    }
  </script>
  <link rel="stylesheet" href="/views/style.css">
  <link rel="stylesheet" href="/views/colorpicker.css" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>

<body>
  <!-- Top Bar (same structure as Generation Page) -->
  <header class="top-bar">
    <div class="top-bar-content">
      <div class="brand">Hue & YOU</div>
      <nav class="nav-menu">
        <a href="/views/GenerationPage.html" class="nav-item">Generate</a>
        <a href="/views/GenerationPage.html#edit" class="nav-item">Edit</a>
        <a href="/views/library.html" class="nav-item active">Library</a>
        <a href="/views/GenerationPage.html#about" class="nav-item">About WCAG</a>
      </nav>
    </div>
  </header>

  <div class="main-container">
    <!-- Left Sidebar (kept minimal for library) -->
    <aside class="sidebar">
      <div class="card">
        <h2 class="card-title">Library Controls</h2>

        <!-- Search bar -->
      </div>

      <div class="actions-area">
        <div class="icon-buttons">
          <button class="icon-btn" aria-label="Share" title="Share">
            <span class="icon-text">⎘</span>
          </button>
          <button class="icon-btn" aria-label="Randomize" title="Randomize">
            <span class="icon-text">⤨</span>
          </button>
          <button class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
            <span class="icon-text">☀</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="palettes-grid" id="library-grid">
        <!-- Palettes will be dynamically inserted here -->
      </div>
    </main>
  </div>

  <footer class="app-footer">
    <small>Palette Library — view and export palettes.</small>
  </footer>

  <script type = "module">
    import { FilterType } from '/shared/utils/constants.js';
    import { toggleTheme } from '/src/toggleThemeBtn.js';
    import { getLibraryPalettes } from '/src/libraryPalettes.js';
    import { getTextColor } from '/shared/utils/textColorOverlay.js';

    //set page theme based on localStorage @TODO a little slow may need optimization
    if (localStorage.getItem('theme') === FilterType.DARK_MODE) toggleTheme(false);
    
    // Event listener for theme toggle button
    document.querySelector('.icon-btn[title="Toggle theme"]').addEventListener('click', () => {
      toggleTheme();
    });

    const paletteList = getLibraryPalettes();

    // Use the library grid element (this page uses id="library-grid")
    const palettesGrid = document.getElementById('library-grid');
    // There's no `empty-state` element on the library page (only on GenerationPage),
    // so guard access before using it.
    const emptyState = document.getElementById('empty-state');

    console.log('Library palettes:', paletteList);

    // Show palettes grid and hide empty state when present
    if (palettesGrid) palettesGrid.classList.remove('hidden');
    if (emptyState) emptyState.classList.add('hidden');

    // Clear existing palettes (only if the grid exists)
    if (palettesGrid) palettesGrid.innerHTML = '';

    // Create a card for each palette in the list
    paletteList.forEach((palette, paletteIndex) => {
      // Create palette card
      const card = document.createElement('div');
      card.className = 'palette-card';

      // Palette colors - extract from the palette's colorMap
      const colorsContainer = document.createElement('div');
      colorsContainer.className = 'palette-colors';

      // Iterate through the colorMap to get all colors
      for (const [color, role] of palette.colorMap.entries()) {
        const colorDiv = document.createElement('div');
        colorDiv.className = 'palette-color';
        colorDiv.style.backgroundColor = color.getHEX().value;

        //add text on top of color swatch
        const colorLabel = document.createElement('span');
        colorLabel.className = 'color-label';
        colorLabel.textContent = role;
        colorLabel.style.color = getTextColor(color).value;
        colorDiv.appendChild(colorLabel);

        colorsContainer.appendChild(colorDiv);
      }
      card.appendChild(colorsContainer);

      // Palette info and actions
      const info = document.createElement('div');
      info.className = 'palette-info';

      const label = document.createElement('span');
      label.className = 'palette-label';
      const nextIndex = palettesGrid.querySelectorAll('.palette-card').length + 1;
      label.textContent = `Palette ${nextIndex}`;
      info.appendChild(label);

      const actions = document.createElement('div');
      actions.className = 'palette-actions';
      ['Export', 'Preview', 'Edit'].forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'text-btn';
        btn.textContent = text;
        actions.appendChild(btn);
      });
      info.appendChild(actions);

      card.appendChild(info);

      // Append to grid
      palettesGrid.appendChild(card);
    });

    // Scroll the last card into view
    const lastCard = palettesGrid.lastElementChild;
    if (lastCard) {
      lastCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
  </script>

</body>

</html>
