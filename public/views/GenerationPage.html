<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Hue & YOU - Color Palette Generator</title>
  <link rel="stylesheet" href="/views/style.css">
  <link rel="stylesheet" href="/views/colorpicker.css" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "culori": "https://cdn.jsdelivr.net/npm/culori@4.0.2/+esm"
      }
    }
  </script>


</head>

<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-content">
      <div class="brand">Hue & YOU</div>
      <nav class="nav-menu">
        <a href="#generate" class="nav-item active">Generate</a>
        <a href="#edit" class="nav-item">Edit</a>
        <a href="#library" class="nav-item">Library</a>
        <a href="#about" class="nav-item">About WCAG</a>
      </nav>
    </div>
  </header>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <!-- Color Card -->
      <div class="card">
        <h2 class="card-title">Color</h2>
        
        <div class="form-group">
          <label for="harmony-type" class="form-label">Harmony type</label>
          <select id="harmony-type" class="form-select">
            <!-- Options populated from constants.js -->
          </select>
        </div>

        <div class="form-group">
          <label for="base-color" class="form-label">Base color</label>
          <button id="base-color" class="color-swatch-btn" aria-label="Select base color">
            <span class="color-preview" style="background-color: #3399ff;"></span>
          </button>
        </div>

        <div class="form-group">
          <label for="num-swatches" class="form-label">Number of swatches</label>
          <div class="stepper">
            <button class="stepper-btn" aria-label="Decrease">−</button>
            <input type="number" id="num-swatches" class="stepper-input" value="5" min="3" max="10" readonly>
            <button class="stepper-btn" aria-label="Increase">+</button>
          </div>
        </div>
      </div>

      <!-- Filters Card -->
      <div class="card">
        <h2 class="card-title">Filters</h2>
        
        <div class="form-group">
          <label for="filter-type" class="form-label">Palette Theme mode</label>
          <select id="filter-type" class="form-select">
            <option value="none">None</option>
            <!-- Colorblind options populated from constants.js -->
          </select>
        </div>


        <button class="add-filter-btn">+ Add filter</button>
      </div>

      <!-- Actions Area (Bottom Left)-->
      <div class="actions-area">
        <div class="icon-buttons">
          <button class="icon-btn" aria-label="Share" title="Share">
            <span class="icon-text">⎘</span>
          </button>
          <button class="icon-btn" aria-label="Randomize" title="Randomize">
            <span class="icon-text">⤨</span>
          </button>
          <button class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
            <span class="icon-text">☀</span>
          </button>
        </div>
        <button class="generate-btn">Generate palettes</button>
      </div>
    </aside>

    <!-- Main Content Area (Right Side) -->
    <main class="main-content">
      <!-- Empty State (Initially shown) -->
      <div class="empty-state" id="empty-state">
        <div class="empty-state-card">
          <h1 class="empty-state-title">No palettes yet</h1>
          <p class="empty-state-text">Adjust the settings on the left, then generate your first palette.</p>
          <button class="generate-btn">Generate palettes</button>
        </div>
      </div>

      <!-- Palettes Grid (Hidden initially) -->
      <!-- Placeholder palettes for demonstration -->

      <div class="palettes-grid hidden" id="palettes-grid">
        <!-- Generated palettes will be inserted here -->
      </div>
    </main>
  </div>
  

  <script type="module">
    import { ColorHarmony, FilterType, ColorFormat } from '/shared/utils/constants.js';
    import { ColorPicker } from '/paletteModule/colorPicker.js';
    import { initializeGenerateButtons } from '/src/generateBtn.js';
    import { share } from '/src/shareBtn.js';
    import { toggleTheme } from '/src/toggleThemeBtn.js';
    import { randomize } from '/src/randomizeBtn.js';
    import { generatePalette } from '/src/generateBtn.js';
    import {getTextColor} from '/shared/utils/textColorOverlay.js';

    //set page theme based on localStorage @TODO a little slow may need optimization
    if (localStorage.getItem('theme') === FilterType.DARK_MODE) toggleTheme(false);
    
    // Initialize color picker
    const baseColorBtn = document.getElementById('base-color');
    const colorPicker = new ColorPicker(baseColorBtn, (color) => {
        // Callback when a color is selected in HEX format
      console.log('Selected color:', color);
      baseColorBtn.querySelector('.color-preview').style.backgroundColor = color;
    });
    
    // Populate harmony type dropdown
    const harmonySelect = document.getElementById('harmony-type');
    Object.entries(ColorHarmony).forEach(([key, value]) => {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = key.split('_').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
      ).join(' ');
      harmonySelect.appendChild(option);
    });

    // Populate Filter Type  dropdown (keeping 'None' option)
    const filterTypeSelect = document.getElementById('filter-type');
    Object.entries(FilterType).forEach(([key, value]) => {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = key.split('_').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
      ).join(' ');
      filterTypeSelect.appendChild(option);
    });

    // Initialize the generate buttons with their respective IDs and selectors
    initializeGenerateButtons('.generate-btn', '.generate-btn', 'empty-state', 'palettes-grid');

    // Stepper functionality
    const stepperBtns = document.querySelectorAll('.stepper-btn');
    const stepperInput = document.getElementById('num-swatches');

    stepperBtns.forEach((btn, index) => {
      btn.addEventListener('click', () => {
        let value = parseInt(stepperInput.value);
        if (index === 0) { // Decrease
          if (value > 3) stepperInput.value = value - 1;
        } else { // Increase
          if (value < 10) stepperInput.value = value + 1;
        }
      });
    });

    const generationSettings = {
      harmonyType: harmonySelect.value,
      numSwatches: parseInt(stepperInput.value),
      filterType: filterTypeSelect.value,
      baseColor: document.querySelector('.color-preview').style.backgroundColor
    };

    // Add event listeners for buttons
    document.querySelectorAll('.generate-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const paletteList = await generatePalette(generationSettings);

        const palettesGrid = document.getElementById('palettes-grid');
        const emptyState = document.getElementById('empty-state');

        console.log('Generated palettes:', paletteList);

        // Show palettes grid and hide empty state
        palettesGrid.classList.remove('hidden');
        emptyState.classList.add('hidden');

        // Clear existing palettes
        palettesGrid.innerHTML = '';

        // Create a card for each palette in the list
        paletteList.forEach((palette, paletteIndex) => {
          // Create palette card
          const card = document.createElement('div');
          card.className = 'palette-card';

          // Palette colors - extract from the palette's colorMap
          const colorsContainer = document.createElement('div');
          colorsContainer.className = 'palette-colors';

          // Iterate through the colorMap to get all colors
          for (const [color, role] of palette.colorMap ) {
            const colorDiv = document.createElement('div');
            colorDiv.className = 'palette-color';
            colorDiv.style.backgroundColor = color.getHEX().value;

            //add text on top of color swatch
            const colorLabel = document.createElement('span');
            colorLabel.className = 'color-label';
            colorLabel.textContent = role;
            colorLabel.style.color = getTextColor(color).value;
            colorDiv.appendChild(colorLabel);

            colorsContainer.appendChild(colorDiv);
          }
          card.appendChild(colorsContainer);

          // Palette info and actions
          const info = document.createElement('div');
          info.className = 'palette-info';

          const label = document.createElement('span');
          label.className = 'palette-label';
          const nextIndex = palettesGrid.querySelectorAll('.palette-card').length + 1;
          label.textContent = `Palette ${nextIndex}`;
          info.appendChild(label);

          // Ian: It may be more preferable to use HTML templates for the cards rather than creating elements via JS
          const actions = document.createElement('div');
          actions.className = 'palette-actions';
          ['Export', 'Preview', 'Edit'].forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'text-btn';
            btn.textContent = text;
            actions.appendChild(btn);
          });
          info.appendChild(actions);

          card.appendChild(info);

          // Append to grid
          palettesGrid.appendChild(card);
      });

      // Scroll the last card into view
      const lastCard = palettesGrid.lastElementChild;
      if (lastCard) {
        lastCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      });
    });
    document.querySelector('.icon-btn[aria-label="Toggle theme"]').addEventListener('click', () => toggleTheme(true));
    document.querySelector('.icon-btn[aria-label="Share"]').addEventListener('click', () => share());
    document.querySelector('.icon-btn[aria-label="Randomize"]').addEventListener('click', () => randomize(colorPicker));

  </script>
</body>
</html>
